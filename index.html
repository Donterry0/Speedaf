<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thuga Credit Union • Demo</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-black text-white min-h-screen">

  <div id="loginScreen" class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-md">
      <h1 class="text-4xl font-bold text-center text-emerald-400 mb-2">Thuga Credit Union</h1>
      <p class="text-center text-gray-400 mb-8">Live Firebase Demo</p>

      <div class="bg-gray-900 p-6 rounded-2xl">
        <input id="loginEmail" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-800 rounded-xl border border-gray-700 focus:border-emerald-500 outline-none" value="test@thuga.com">
        <input id="loginPassword" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-gray-800 rounded-xl border border-gray-700 focus:border-emerald-500 outline-none" value="123456">
        <button onclick="login()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold">Sign In</button>
        <p id="loginError" class="text-red-400 text-center mt-4 hidden"></p>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden p-6">
    <h1 class="text-3xl font-bold text-emerald-400">Welcome, Thuga Member</h1>
    <p id="userEmail" class="text-gray-400 mt-2"></p>

    <div class="mt-8">
      <button onclick="logout()" class="bg-red-900/50 px-6 py-3 rounded-xl">Sign Out</button>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    function login() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(user => {
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          document.getElementById('userEmail').textContent = user.user.email;
        })
        .catch(err => {
          document.getElementById('loginError').textContent = err.message;
          document.getElementById('loginError').classList.remove('hidden');
        });
    }

    function logout() {
      auth.signOut().then(() => location.reload());
    }
  </script>
</body>
</html>
