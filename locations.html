<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Locations - Swiftship</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/logo.svg" alt="Swiftship" height="32">
        <span>Swiftship</span>
      </a>
      <nav>
        <a href="tracking.html">Tracking</a>
        <a href="rates.html">Rates</a>
        <a href="locations.html">Locations</a>
      </nav>
    </div>
  </header>

  <section class="page-section">
    <div class="container">
      <div class="page-header">
        <h1>Find Swiftship Locations</h1>
        <p>Drop boxes, service centers, and partner locations near you</p>
      </div>

      <div class="form-card">
        <form id="location-form">
          <div class="form-group">
            <label for="location-search">City or Postal Code</label>
            <input 
              type="text" 
              id="location-search" 
              placeholder="e.g. Lagos or 100001" 
              required
            >
          </div>
          <button type="submit" class="btn btn-dark" style="width: 100%;">
            Search Locations
          </button>
        </form>

        <div id="location-result" class="result-box"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Swiftship. Built from scratch.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
