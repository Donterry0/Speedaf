<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Package - Swiftship</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/logo.svg" alt="Swiftship" height="32">
        <span>Swiftship</span>
      </a>
      <nav>
        <a href="tracking.html">Tracking</a>
        <a href="rates.html">Rates</a>
        <a href="locations.html">Locations</a>
      </nav>
    </div>
  </header>

  <section class="page-section">
    <div class="container">
      <div class="page-header">
        <h1>Track Your Shipment</h1>
        <p>Enter your tracking number to see real-time package updates</p>
      </div>

      <div class="form-card">
        <form id="tracking-form">
          <div class="form-group">
            <label for="tracking-number">Tracking Number</label>
            <input 
              type="text" 
              id="tracking-number" 
              placeholder="e.g. SS123456789NG" 
              required
            >
          </div>
          <button type="submit" class="btn btn-dark" style="width: 100%;">
            Track Package
          </button>
        </form>

        <div id="tracking-result" class="result-box"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Swiftship. Built from scratch.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
