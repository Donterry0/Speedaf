<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Shipping Rates - Swiftship</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/logo.svg" alt="Swiftship" height="32">
        <span>Swiftship</span>
      </a>
      <nav>
        <a href="tracking.html">Tracking</a>
        <a href="rates.html">Rates</a>
        <a href="locations.html">Locations</a>
      </nav>
    </div>
  </header>

  <section class="page-section">
    <div class="container">
      <div class="page-header">
        <h1>Calculate Shipping Rates</h1>
        <p>Get an instant quote for your package</p>
      </div>

      <div class="form-card">
        <form id="rate-form">
          <div class="form-row">
            <div class="form-group">
              <label for="origin">Origin City</label>
              <input type="text" id="origin" placeholder="e.g. Lagos" required>
            </div>
            <div class="form-group">
              <label for="destination">Destination City</label>
              <input type="text" id="destination" placeholder="e.g. Abuja" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="weight">Weight (kg)</label>
              <input type="number" id="weight" placeholder="e.g. 2.5" step="0.1" min="0.1" required>
            </div>
            <div class="form-group">
              <label for="service">Service Type</label>
              <select id="service" required>
                <option value="">Select service</option>
                <option value="express">Swiftship Express - Next day</option>
                <option value="ground">Swiftship Ground - 2-5 days</option>
                <option value="freight">Swiftship Freight - Heavy items</option>
                <option value="international">International - 5-10 days</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-dark" style="width: 100%;">
            Calculate Rate
          </button>
        </form>

        <div id="rate-result" class="result-box"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Swiftship. Built from scratch.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
